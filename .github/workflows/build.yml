name: TideApp CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main

jobs:
  build_ipa:
    name: Build IPA with Theos
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Pull Theos image
        run: docker pull docker.io/nem0oo/theos
      # Le runner GitHub a l'uid 1001 mais l'utilisateur builder de l'image a
      # l'uid 1000 et doit pouvoir écrire dans le workspace monté
      - name: Make workspace writable by builder
        run: chmod -R a+rwX ${{ github.workspace }}
      - name: Build package
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/home/builder/code \
            -w /home/builder/code \
            docker.io/nem0oo/theos \
            make package PACKAGE_FORMAT=ipa
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: TideApp-${{ github.sha }}
          path: packages/*.ipa
          if-no-files-found: error
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" packages/*.ipa \
            --title "TideApp ${GITHUB_REF_NAME}" \
            --generate-notes
